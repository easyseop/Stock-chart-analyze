name: lookup

# 수시 즉석 조회: 티커/코드 입력 → 캐시에 추가 → 스크리너 재생성 → Pages 배포.
# 결과: 그 종목이 스크리너 목록과 상세차트에 영구 반영됨(+ 로그에 신호 카드).
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "티커 또는 한국 6자리 코드 (예: AAPL, NVDA, 005930)"
        required: true

permissions:
  contents: write       # universe.csv에 즉석조회 종목을 영구 등록(커밋)
  pages: write
  id-token: write

concurrency:
  group: pages          # daily-scan과 Pages 배포 직렬화(동시 배포 충돌 방지)
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - uses: actions/cache@v4         # daily-scan과 같은 캐시 공유(키 동일)
        with:
          path: |
            data_cache
            data_cache_h
            earnings_cache.json
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-

      - name: 캐시에 추가 + 유니버스 영구등록(신호 카드 로그)
        run: python main.py --add "${{ inputs.ticker }}"

      - name: 유니버스 변경 커밋(즉석조회 종목 영구 보존 — 캐시 리셋에도 안 사라짐)
        run: |
          if ! git diff --quiet -- universe.csv; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add universe.csv
            git commit -m "lookup: ${{ inputs.ticker }} 유니버스 등록"
            git push || echo "push 실패(권한/충돌) — 캐시엔 이미 추가됨"
          else
            echo "유니버스 변경 없음(이미 등록된 종목)"
          fi

      - name: 시간봉(60분) 갱신(전환후보 상위, best-effort)
        run: python main.py --update-hourly 120 || true

      - name: 스크리너 재생성(캐시 전체 — 추가분 포함)
        run: python main.py --cache --scan-cached --screener --screener-dir public

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
