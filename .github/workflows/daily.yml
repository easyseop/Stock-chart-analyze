name: daily-scan

# 자동화: 매 거래일 장마감 후 1회 실행(스케줄). 무한 연쇄(self-chaining) 없음 — 안전.
#   - 매 실행: 캐시 복원 → 백필 한 묶음(기본 50) → 증분 갱신 → 스크리너 생성 → Pages 배포
#   - 유니버스 200을 다 채울 때까지 = 하루 50씩 누적(약 4일) 또는 수동 Re-run으로 빨리.
#   - 다 채워지면 백필은 자동 0이 되고, 이후엔 전일치만 갱신.
# 주의: 클라우드 IP는 야후 레이트리밋이 강해 백필이 0개일 수 있음(그래도 1회만 돌고 멈춤).
on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill:
        description: "이번 실행에서 백필할 묶음 크기"
        default: "50"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

env:
  TARGET: "300"           # 스크리너/백필 대상 종목 수(유니버스 703 중)
  CHUNK: "50"             # 한 실행당 백필 묶음(레이트리밋 회피)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: data_cache
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-

      - name: 백필 한 묶음 + 증분 갱신
        run: |
          python main.py --backfill "${{ github.event.inputs.backfill || env.CHUNK }}"
          python main.py --update

      - name: 스크리너 생성(캐시된 종목만, 네트워크 0)
        run: python main.py --cache --universe-scan "${{ env.TARGET }}" --screener --screener-dir public

      - name: 진행 현황(로그용)
        run: |
          python -c "from scanner import universe,cache; u=[s for s in universe.load() if s.get('code')][:${{ env.TARGET }}]; rem=sum(1 for s in u if not cache.is_cached(s['code'])); print(f'캐시 {len(cache.cached_codes())}종목 · 남은 백필 {rem} (다음 실행/재실행 때 이어서 채움)')"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
