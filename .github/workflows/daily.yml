name: daily-scan

# 자동화: 미국 장중·마감 후 자동 갱신(스케줄). 무한 연쇄 없음 — 안전.
#   대상: 미국주(S&P500 503) 전용. 미국주는 야후 막히면 Stooq 폴백이라 안정적.
#   한국주는 자동 수집 안 함 → lookup(수시 조회)으로 그때만 야후로.
#   장중 실행: 증분 갱신(오늘 가격 반영)만 → 스크리너 → 배포(빠름, 백필 없음).
#   마감후 실행: 백필(새 종목) + 증분 갱신 → 스크리너 → 배포.
#   백필: 매 실행 '아직 캐시 없는 종목 전부'를 받는다(CHUNK=9999). 한 번이면 유니버스 완성.
#   ※ 미국 서머타임(3~11월) 기준 개장 22:30·마감 05:00(KST). UTC 크론은 양 계절을
#     포괄하도록 배치(겨울엔 한 시간씩 밀려도 장중/마감 무렵에 걸침).
on:
  # 코드(파이썬·설정·이 워크플로)를 푸시하면 자동으로 재빌드·배포(데이터 갱신 없이 ~1~2분).
  #   → 코드 바꿀 때마다 수동으로 Run workflow 할 필요 없음.
  push:
    branches: ["claude/korean-text-review-o3wmsv"]   # 기본 브랜치만(중복 실행 방지)
    paths:
      - "scanner/**"
      - "main.py"
      - "config.py"
      - ".github/workflows/daily.yml"
  schedule:
    - cron: "30 13 * * 1-5"   # 미 개장 직후(여름) — 오늘 가격 반영 시작
    - cron: "0 17 * * 1-5"    # 장중 갱신
    - cron: "30 20 * * 1-5"   # 마감 무렵 갱신
    - cron: "0 22 * * 1-5"    # 마감 후: 백필 + 일일 정리(메인)
  workflow_dispatch:
    inputs:
      update:
        type: choice
        description: "데이터 갱신 범위 — none=재배포만(가장 빠름·코드만 반영) / top=상위300 / full=전체(느림)"
        options: ["none", "top", "full"]
        default: "none"
      backfill:
        description: "백필 묶음(update=full일 때만 적용, 미수집분 전부면 9999)"
        default: "9999"
      prune:
        description: "캐시 정리(수동 전용): 'korean' / 'illiquid:N' / 'CODE,CODE'. 비우면 안 함"
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages          # lookup과 Pages 배포 직렬화(동시 배포 충돌 방지)
  cancel-in-progress: false

env:
  TARGET: "3000"          # 스크리너 표시 상한(유니버스 확장 대비 넉넉히)
  CHUNK: "9999"           # 한 실행에 미수집분 전부 백필(백필=아직 없는 종목만 받음)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: |
            data_cache
            data_cache_h
            earnings_cache.json
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-

      # 갱신 범위: push(코드변경)=none(재배포만) / 마감후 스케줄=전체 / 장중 스케줄=상위300 /
      #   수동(dispatch)=입력값(none=재배포만·top=상위300·full=전체). none이면 데이터 안 받음 → 1~2분.
      - name: 데이터 갱신 (범위별)
        env:
          MODE: ${{ github.event_name == 'push' && 'none' || (github.event_name == 'workflow_dispatch' && github.event.inputs.update || (github.event.schedule == '0 22 * * 1-5' && 'full' || 'top')) }}
        run: |
          echo "갱신 모드: $MODE"
          if [ "$MODE" = "full" ]; then
            python main.py --backfill "${{ github.event.inputs.backfill || env.CHUNK }}"
            python main.py --update
          elif [ "$MODE" = "top" ]; then
            python main.py --update-top 300
          else
            echo "재배포만 — 데이터 갱신 건너뜀(캐시 그대로 사용)"
          fi

      # 캐시 정리는 백필 '후'에 — illiquid:N(거래대금 상위만)은 캐시가 채워진 뒤 평가해야 정확.
      - name: 캐시 정리(수동 입력 시에만 — korean / illiquid:N / 종목코드)
        if: ${{ github.event.inputs.prune != '' }}
        run: python main.py --prune "${{ github.event.inputs.prune }}"

      # 어닝 발표일: 마감후 스케줄 또는 수동 full에서만(하루 1회 충분). 실패해도 무시.
      - name: 어닝 발표일 갱신(best-effort)
        if: ${{ github.event.schedule == '0 22 * * 1-5' || (github.event_name == 'workflow_dispatch' && github.event.inputs.update == 'full') }}
        run: python main.py --update-earnings || true

      # 시간봉: 데이터 갱신을 하는 실행에서만(push/none이면 건너뜀). 상위 80종목.
      - name: 시간봉(60분) 갱신(전환후보 상위, best-effort)
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.update != 'none') }}
        run: python main.py --update-hourly 80 || true

      - name: 스크리너 생성(캐시 전체 — 즉석조회 추가분 포함, 네트워크 0)
        run: python main.py --cache --scan-cached --screener --screener-dir public

      - name: 진행 현황(로그용)
        run: |
          python -c "from scanner import universe,cache; u=[s for s in universe.load() if s.get('code')][:${{ env.TARGET }}]; rem=sum(1 for s in u if not cache.is_cached(s['code'])); print(f'캐시 {len(cache.cached_codes())}종목 · 남은 백필 {rem} (다음 실행/재실행 때 이어서 채움)')"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
