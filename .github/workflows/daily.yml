name: daily-scan

# 자동화: 매 거래일 장마감 후 실행 + 백필이 끝날 때까지 스스로 다음 실행을 이어감.
#   - 매 실행: 캐시 복원 → 백필 한 묶음(기본 50) → 증분 갱신 → 스크리너 생성 → Pages 배포
#   - 유니버스(TARGET개) 백필이 남아 있으면 자기 자신을 다시 트리거(self-chaining)
#   - 다 채워지면 백필은 자동 0이 되고, 이후엔 전일치만 갱신
on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill:
        description: "이번 실행에서 백필할 묶음 크기"
        default: "50"

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write          # self-chaining(workflow 재실행)용

concurrency:
  group: daily-scan
  cancel-in-progress: false

env:
  TARGET: "200"           # 스크리너/백필 대상 종목 수
  CHUNK: "50"             # 한 실행당 백필 묶음(레이트리밋 회피)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: data_cache
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-

      - name: 백필 한 묶음 + 증분 갱신
        run: |
          python main.py --backfill "${{ github.event.inputs.backfill || env.CHUNK }}"
          python main.py --update

      - name: 스크리너 생성(캐시된 종목만, 네트워크 0)
        run: python main.py --cache --universe-scan "${{ env.TARGET }}" --screener --screener-dir public

      - name: 남은 백필 수 계산
        id: remain
        run: |
          R=$(python -c "from scanner import universe,cache; u=[s for s in universe.load() if s.get('code')][:${{ env.TARGET }}]; print(sum(1 for s in u if not cache.is_cached(s['code'])))")
          echo "remaining=$R" >> "$GITHUB_OUTPUT"
          echo "남은 백필: $R 종목"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 백필이 남았으면 다음 실행을 이어감(self-chaining)
        if: steps.remain.outputs.remaining != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run daily.yml --ref "${{ github.ref_name }}" -f backfill="${{ env.CHUNK }}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
